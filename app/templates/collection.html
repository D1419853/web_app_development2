{% extends "base.html" %}

{% block title %}我的收藏 - 追劇推薦系統{% endblock %}

{% block content %}
<h2 class="mb-4">❤️ 我的想看清單 ({{ items|length }})</h2>

{% if items %}
<div class="table-responsive">
    <table class="table table-hover align-middle">
        <thead class="table-dark">
            <tr>
                <th>劇照</th>
                <th>劇名</th>
                <th>加入時間</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>
            {% for item in items %}
            <tr>
                <td>
                    <img src="{{ item.drama_image or 'https://via.placeholder.com/80x120' }}" alt="{{ item.drama_title }}" style="width: 80px; height: 120px; object-fit: cover;" class="rounded shadow-sm">
                </td>
                <td>
                    <a href="{{ url_for('main.drama_detail', id=item.drama_id) }}" class="text-decoration-none fw-bold text-dark">
                        {{ item.drama_title }}
                    </a>
                </td>
                <td class="text-muted">{{ item.added_at }}</td>
                <td>
                    <form action="{{ url_for('collection.remove_from_collection') }}" method="POST" onsubmit="return confirm('確定要移除收藏嗎？');">
                        <input type="hidden" name="drama_id" value="{{ item.drama_id }}">
                        <button type="submit" class="btn btn-outline-danger btn-sm">移除</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% else %}
<div class="text-center py-5">
    <p class="fs-4 text-muted">您的收藏清單空空如也。</p>
    <a href="{{ url_for('main.index') }}" class="btn btn-danger">去逛逛找好劇</a>
</div>
{% endif %}
{% endblock %}
